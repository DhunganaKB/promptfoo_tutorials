name: LLM Security Tests

# ── Triggers ───────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]
    paths:
      - "part3_cicd_assertions/**"
      - ".github/workflows/llm-security.yml"
  pull_request:
    branches: [main]
    paths:
      - "part3_cicd_assertions/**"
  schedule:
    # Nightly at 02:00 UTC — catches model drift even without code changes
    - cron: "0 2 * * *"
  workflow_dispatch:
    # Manual trigger from the GitHub Actions UI

# ── Defaults ───────────────────────────────────────────────────────────────
defaults:
  run:
    working-directory: part3_cicd_assertions

# ── Jobs ───────────────────────────────────────────────────────────────────
jobs:
  security-eval:
    name: Security Evaluation
    runs-on: ubuntu-latest
    timeout-minutes: 20          # Kill runaway jobs

    permissions:
      contents: read
      pull-requests: write       # Needed to post PR comments

    steps:
      # 1. Code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Node — promptfoo runs via npx (no install required)
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # 3. Cache the npx/npm download so repeated runs are instant
      - name: Cache npm (promptfoo)
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-promptfoo-v1
          restore-keys: |
            ${{ runner.os }}-npm-promptfoo-

      # 4. Python — for assertion scripts and parse_results.py
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: part3_cicd_assertions/requirements.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # 5. Run security eval
      #    • OPENAI_API_KEY injected from repo secrets
      #    • PROMPTFOO_DISABLE_TELEMETRY keeps CI logs clean
      #    • Script exits non-zero if any test fails → job fails
      - name: Run security evaluation
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PROMPTFOO_DISABLE_TELEMETRY: "1"
          CI: "true"
        run: bash scripts/run_eval.sh promptfooconfig.security.yaml

      # 6. Write result summary to GitHub's built-in step summary
      - name: Write step summary
        if: always()
        run: |
          python scripts/parse_results.py output/results.json \
            --format github >> $GITHUB_STEP_SUMMARY

      # 7. Upload JSON results as downloadable artifact (kept 30 days)
      - name: Upload results artifact
        uses: actions/upload-artifact@v4
        if: always()         # Upload even if tests fail
        with:
          name: security-eval-results-${{ github.run_number }}
          path: part3_cicd_assertions/output/
          retention-days: 30

      # 8. Post a comment on the PR with a pass/fail summary
      - name: Comment on PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request' && always()
        with:
          script: |
            const fs   = require('fs');
            const path = 'part3_cicd_assertions/output/results.json';
            if (!fs.existsSync(path)) return;

            const data   = JSON.parse(fs.readFileSync(path, 'utf8'));
            const inner  = data.results || data;
            const stats  = inner.stats  || {};
            const pass   = stats.successes || 0;
            const fail   = stats.failures  || 0;
            const total  = pass + fail;
            const icon   = fail > 0 ? '❌' : '✅';
            const status = fail > 0 ? 'FAILED'  : 'PASSED';

            const body = [
              `## ${icon} LLM Security Eval — ${status}`,
              '',
              '| | |',
              '|---|---|',
              `| **Total tests** | ${total} |`,
              `| ✅ Passed | ${pass} |`,
              `| ❌ Failed | ${fail} |`,
              '',
              fail > 0
                ? '> ⚠️ **Security vulnerabilities detected.** Download the [artifact](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.'
                : '> All security checks passed — safe to merge.',
              '',
              `*Run [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) · promptfoo*`
            ].join('\n');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              body
            });
