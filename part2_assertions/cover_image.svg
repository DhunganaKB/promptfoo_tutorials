  <text x="578" y="650" font-family="monospace" font-size="11" fill="#6b7280">def </text>
  <text x="604" y="650" font-family="monospace" font-size="11" fill="#f472b6">get_assert</text>
  <text x="676" y="650" font-family="monospace" font-size="11" fill="#e2e8f0">(output: </text>
  <text x="730" y="650" font-family="monospace" font-size="11" fill="#67e8f9">str</text>
  <text x="756" y="650" font-family="monospace" font-size="11" fill="#e2e8f0">, context: </text>
  <text x="828" y="650" font-family="monospace" font-size="11" fill="#67e8f9">dict</text>
  <text x="858" y="650" font-family="monospace" font-size="11" fill="#e2e8f0">):</text>
  <text x="578" y="672" font-family="monospace" font-size="11" fill="#6b7280">  for label, pattern in _PATTERNS.items():</text>
  <text x="578" y="692" font-family="monospace" font-size="11" fill="#6b7280">    matches = re.findall(pattern, </text>
  <text x="810" y="692" font-family="monospace" font-size="11" fill="#a5f3a0">output</text>
  <text x="848" y="692" font-family="monospace" font-size="11" fill="#6b7280">)</text>
  <text x="578" y="714" font-family="monospace" font-size="11" fill="#6b7280">  if found: return {</text>
  <text x="694" y="714" font-family="monospace" font-size="11" fill="#fbbf24">"pass"</text>
  <text x="737" y="714" font-family="monospace" font-size="11" fill="#6b7280">: </text>
  <text x="748" y="714" font-family="monospace" font-size="11" fill="#f87171">False</text>
  <text x="786" y="714" font-family="monospace" font-size="11" fill="#6b7280">, </text>
  <text x="798" y="714" font-family="monospace" font-size="11" fill="#fbbf24">"score"</text>
  <text x="848" y="714" font-family="monospace" font-size="11" fill="#6b7280">: </text>
  <text x="860" y="714" font-family="monospace" font-size="11" fill="#fb923c">0.0</text>
  <text x="880" y="714" font-family="monospace" font-size="11" fill="#6b7280">}</text>
  <text x="578" y="736" font-family="monospace" font-size="11" fill="#6b7280">  return {</text>
  <text x="636" y="736" font-family="monospace" font-size="11" fill="#fbbf24">"pass"</text>
  <text x="678" y="736" font-family="monospace" font-size="11" fill="#6b7280">: </text>
