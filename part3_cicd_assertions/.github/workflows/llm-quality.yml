name: LLM Quality Tests

# ── Triggers ───────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]
    paths:
      - "part3_cicd_assertions/**"
      - ".github/workflows/llm-quality.yml"
  pull_request:
    branches: [main]
    paths:
      - "part3_cicd_assertions/**"
  workflow_dispatch:

defaults:
  run:
    working-directory: part3_cicd_assertions

jobs:
  quality-eval:
    name: "Quality · ${{ matrix.provider }}"
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read
      pull-requests: write

    # ── Matrix: test multiple models in parallel ──────────────────────────
    # Extend this list to compare models side-by-side on every PR.
    strategy:
      fail-fast: false           # Don't cancel other providers if one fails
      matrix:
        provider:
          - openai:gpt-4o-mini
          # - openai:gpt-4o        # Uncomment to add GPT-4o comparison
          # - anthropic:messages:claude-haiku-4-5-20251001

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache npm (promptfoo)
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-promptfoo-v1
          restore-keys: |
            ${{ runner.os }}-npm-promptfoo-

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: part3_cicd_assertions/requirements.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # Override the provider via env var — injected into the YAML by promptfoo
      - name: Run quality evaluation
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PROMPTFOO_DISABLE_TELEMETRY: "1"
          CI: "true"
        run: |
          # Write a one-line provider override into the config before running
          export PROMPTFOO_PROVIDER="${{ matrix.provider }}"
          bash scripts/run_eval.sh promptfooconfig.quality.yaml

      - name: Write step summary
        if: always()
        run: |
          echo "### Provider: \`${{ matrix.provider }}\`" >> $GITHUB_STEP_SUMMARY
          python scripts/parse_results.py output/results.json \
            --format github >> $GITHUB_STEP_SUMMARY

      - name: Upload results artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          # Include provider name so artifacts don't overwrite each other
          name: quality-eval-${{ matrix.provider }}-${{ github.run_number }}
          path: part3_cicd_assertions/output/
          retention-days: 14

      - name: Comment on PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request' && always()
        with:
          script: |
            const fs   = require('fs');
            const path = 'part3_cicd_assertions/output/results.json';
            if (!fs.existsSync(path)) return;

            const data  = JSON.parse(fs.readFileSync(path, 'utf8'));
            const inner = data.results || data;
            const stats = inner.stats  || {};
            const pass  = stats.successes || 0;
            const fail  = stats.failures  || 0;
            const icon  = fail > 0 ? '❌' : '✅';

            const body = [
              `## ${icon} Quality Eval — \`${{ matrix.provider }}\``,
              '',
              `| ✅ Passed | ❌ Failed |`,
              `|---|---|`,
              `| ${pass} | ${fail} |`,
              '',
              fail > 0
                ? '> Quality regressions detected — review before merging.'
                : '> All quality checks passed.',
            ].join('\n');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              body
            });
